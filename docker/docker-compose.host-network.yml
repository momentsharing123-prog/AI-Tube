name: ai-tube-prod

# Example configuration for systems where bridge network cannot access internet
# (e.g., OpenWrt/iStoreOS on arm64)
#
# Usage: docker compose -f docker-compose.host-network.yml up -d
#
# This configuration uses host network mode for the backend to allow internet access,
# while keeping the frontend on bridge network with proper nginx configuration.

services:
  backend:
    image: franklioxygen/mytube:backend-latest
    pull_policy: always
    container_name: ai-tube-prod
    network_mode: host
    volumes:
      - /share/CACHEDEV2_DATA/Medias/AI Tube/uploads:/app/uploads
      - /share/CACHEDEV2_DATA/Medias/AI Tube/data:/app/data
    environment:
      - PORT=5551
      # Optional: match the backend process uid/gid to the host-side file ownership.
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      # Set to 0 to disable the startup chown pass for bind-mounted data/uploads.
      - AITUBE_AUTO_FIX_PERMISSIONS=${AITUBE_AUTO_FIX_PERMISSIONS:-1}
      # Optional: declare the admin trust boundary for this deployment.
      # Valid values: application | container | host
      # Docs: documents/en/deployment-security-model.md
      - AITUBE_ADMIN_TRUST_LEVEL=container
    restart: unless-stopped
    # Note: In host mode, the container uses the host's network stack directly
    # The backend will be accessible at localhost:5551 on the host

  frontend:
    image: franklioxygen/mytube:frontend-latest
    pull_policy: always
    container_name: ai-tube-prod-web
    ports:
      - "5556:5556"
    environment:
      - VITE_API_URL=/api
      - VITE_BACKEND_URL=
      # Configure nginx to use localhost:5551 to reach backend in host mode
      - NGINX_BACKEND_URL=http://localhost:5551
      # Alternative: if backend is on a different host, use:
      # - NGINX_BACKEND_URL=http://<host-ip>:5551
      # - API_HOST=<host-ip>
      # - API_PORT=5551
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - aitube-network

volumes:
  backend-data:
    driver: local

networks:
  aitube-network:
    driver: bridge
